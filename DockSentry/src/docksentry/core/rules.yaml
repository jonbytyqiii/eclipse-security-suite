# ====================================================================
# DOCKSENTRY CSPM PLATFORM COMPLIANCE RULES MATRIX (CIS & ADVANCED ALIGNED)
# ====================================================================

rules:
  - id: "DS-CIS-4.1"
    name: "Privileged Container Execution Check"
    severity: "CRITICAL"
    category: "Runtime"
    mapping: "CIS Docker 4.1"
    remediation: "Remove '--privileged' flag. Explicitly drop all capabilities and whitelist essential requirements via '--cap-add'."
    description: "Container drops all namespace separation limits, granting process root control over host system resources."

  - id: "DS-CIS-4.2"
    name: "Protected Host Communication Daemon Socket Mount"
    severity: "CRITICAL"
    category: "Storage"
    mapping: "CIS Docker 4.2"
    remediation: "Remove socket maps. Decouple components and exchange context through authenticated network API paths."
    description: "Mounting docker.sock or podman.sock routes immediate administrative command hooks inside the workload container."

  - id: "DS-CIS-4.3"
    name: "Administrative Root User Namespace Execution"
    severity: "HIGH"
    category: "Identity"
    mapping: "CIS Docker 4.3"
    remediation: "Declare 'USER appuser' within Dockerfile build steps, or push the '--user' flag configuration onto execution runs."
    description: "Workload runtimes starting processes under root identities bypass breakout barriers when kernel flaws occur."

  - id: "DS-CIS-4.4"
    name: "Missing Compute Resource Slicing (CPU/Memory Restrictions)"
    severity: "MEDIUM"
    category: "Resources"
    mapping: "CIS Docker 4.4"
    remediation: "Introduce memory boundaries using '--memory' and enforce execution schedule controls via '--cpus'."
    description: "Omitting resource consumption maximum limits creates unmitigated vectors for internal Denial-of-Service constraints."

  - id: "DS-CIS-4.5"
    name: "Disabled Seccomp Security System Call Profile"
    severity: "HIGH"
    category: "Kernel"
    mapping: "CIS Docker 4.5"
    remediation: "Strip '--security-opt seccomp=unconfined' switches to fall back to the built-in operating system security layers."
    description: "Operating without default system call filtering profiles permits microarchitectural execution vectors."

  - id: "DS-CIS-4.6"
    name: "Sensitive Native Host Filesystem Direct Volume Alignment"
    severity: "HIGH"
    category: "Storage"
    mapping: "CIS Docker 4.6"
    remediation: "Isolate application writes. Avoid bindings targeting /etc, /root, /var/log, or host environment frameworks."
    description: "Exposing raw operating system partitions allows persistent structural changes to the running host OS."

  - id: "DS-CIS-4.7"
    name: "Host Network Namespace Direct Sharing Hook"
    severity: "MEDIUM"
    category: "Network"
    mapping: "CIS Docker 4.7"
    remediation: "Deploy custom user-defined software-defined overlay bridges instead of running '--net=host' modes."
    description: "Bypassing containment layers binds the service to host ports, removing network routing controls."

  - id: "DS-CIS-4.8"
    name: "Insecure Plaintext Inter-Container Communication Channels"
    severity: "MEDIUM"
    category: "Network"
    mapping: "CIS Docker 4.8"
    remediation: "Explicitly pass '--icc=false' settings within daemon startup configuration properties."
    description: "Allowing direct cross-workload processing over common bridge segments enables unchecked lateral movement options."

  - id: "DS-CIS-4.9"
    name: "Unrestricted Process ID Namespace Sharing Configuration"
    severity: "HIGH"
    category: "Runtime"
    mapping: "CIS Docker 4.9"
    remediation: "Eliminate '--pid=host' configuration bindings during processing initializations."
    description: "Sharing process namespaces allows workloads to view, intercept, and potentially terminate host processes."

  - id: "DS-CIS-4.10"
    name: "Mutable Writeable Container Base Root Filesystem State"
    severity: "LOW"
    category: "Storage"
    mapping: "CIS Docker 4.10"
    remediation: "Inject the '--read-only' initialization option and mount non-persistent directories to temporary in-memory structures."
    description: "Allowing runtime alteration of root binaries facilitates unauthorized, persistent configuration execution."

  - id: "DS-CIS-5.1"
    name: "Insecure Dynamic Build Secrets Exposure Risk"
    severity: "HIGH"
    category: "Static-Dockerfile"
    mapping: "OWASP Container Top 10"
    remediation: "Leverage standard Docker secret mount features ('--secret') rather than plain text environmental declarations."
    description: "Baking administrative secrets directly into static files preserves sensitive keys across version control history."

  - id: "DS-CIS-5.2"
    name: "Insecure Over-Privileged Container Base Layer Inheritance"
    severity: "HIGH"
    category: "Static-Dockerfile"
    mapping: "OWASP Container Top 10"
    remediation: "Migrate infrastructure foundations over to minimal footprint options like distroless base selections."
    description: "Inheriting full developer tool suites expands the attack surface, providing attackers with pre-installed binaries."

  - id: "DS-CIS-6.1"
    name: "Privileged Kubernetes ServiceAccount Token Automount Enabled"
    severity: "MEDIUM"
    category: "Kubernetes"
    mapping: "NSA-CISA Kubernetes Hardening"
    remediation: "Explicitly configure 'automountServiceAccountToken: false' inside active manifest control files."
    description: "Automatically mounting cluster tokens into unverified pods simplifies privilege escalation if a pod is compromised."